<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nokosu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }
    .tag-error { background:#fee2e2; color:#dc2626; }
    .tag-idea  { background:#fef9c3; color:#ca8a04; }
    .tag-memo  { background:#dbeafe; color:#2563eb; }
    .tab-active { border-bottom: 2px solid #2563eb; color:#2563eb; font-weight:600; }
    textarea:focus, input:focus { outline: none; box-shadow: 0 0 0 2px #93c5fd; }
    #toast { transition: opacity 0.3s; }
    .ai-bubble { background: linear-gradient(135deg, #eff6ff, #f0fdf4); }
    .status-検討中 { background:#f3f4f6; color:#6b7280; }
    .status-やる   { background:#dbeafe; color:#2563eb; }
    .status-完了   { background:#dcfce7; color:#16a34a; }
    @keyframes pulse-dot { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
    .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#6b7280; margin:0 2px; animation: pulse-dot 1.2s infinite; }
    .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    .similar-badge { display:none; }
    .similar-badge.visible { display:inline-flex; align-items:center; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
  <span class="text-gray-300">|</span>
  <span class="text-sm text-gray-400 tracking-widest">nokosu</span>
</header>

<div class="max-w-2xl mx-auto px-4 py-6 space-y-6">

  <!-- 入力エリア -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 space-y-3">
    <textarea id="input-content" rows="3"
      placeholder="エラー、アイデア、メモ... なんでも残す"
      class="w-full text-sm text-gray-800 placeholder-gray-400 border border-gray-200 rounded-lg px-3 py-2 resize-none"
    ></textarea>

    <div class="flex gap-2 flex-wrap items-center">
      <div class="flex gap-1">
        <button onclick="setTag('memo')"  id="btn-memo"  class="tag-btn px-3 py-1 rounded-full text-xs font-medium border border-blue-200 tag-memo opacity-100">memo</button>
        <button onclick="setTag('error')" id="btn-error" class="tag-btn px-3 py-1 rounded-full text-xs font-medium border border-red-200 tag-error opacity-40">error</button>
        <button onclick="setTag('idea')"  id="btn-idea"  class="tag-btn px-3 py-1 rounded-full text-xs font-medium border border-yellow-200 tag-idea opacity-40">idea</button>
      </div>
      <div class="relative flex-1 min-w-[140px]">
        <input id="input-project" type="text" placeholder="プロジェクト（任意）"
          class="w-full text-xs border border-gray-200 rounded-lg px-3 py-1.5"
          autocomplete="off"
          oninput="showProjectSuggests(this.value)"
          onblur="setTimeout(()=>hideSuggests(),150)"
        />
        <ul id="project-suggests" class="hidden absolute z-20 bg-white border border-gray-200 rounded-lg mt-1 w-full shadow text-xs"></ul>
      </div>
      <button onclick="saveLog()" id="btn-save"
        class="ml-auto bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-1.5 rounded-lg transition">
        残す
      </button>
    </div>
  </div>

  <!-- AI対話エリア（保存後に表示） -->
  <div id="ai-area" class="hidden bg-white rounded-xl shadow-sm border border-blue-100 p-4 space-y-3">
    <!-- AIの質問 -->
    <div class="flex gap-2 items-start">
      <span class="text-lg">🤖</span>
      <div id="ai-question" class="ai-bubble rounded-xl px-4 py-3 text-sm text-gray-700 flex-1 whitespace-pre-wrap"></div>
    </div>

    <!-- ローディング -->
    <div id="ai-loading" class="hidden flex gap-2 items-center pl-8">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <!-- 回答入力 -->
    <div id="ai-answer-area" class="hidden space-y-2">
      <textarea id="ai-answer" rows="2"
        placeholder="回答を入力..."
        class="w-full text-sm text-gray-800 placeholder-gray-400 border border-blue-200 rounded-lg px-3 py-2 resize-none"
      ></textarea>
      <div class="flex gap-2 justify-end">
        <button onclick="skipAI()" class="text-xs text-gray-400 hover:text-gray-600 px-3 py-1.5">スキップ</button>
        <button onclick="submitAnswer()"
          class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-4 py-1.5 rounded-lg transition">
          送信
        </button>
      </div>
    </div>

    <!-- AIの提案 -->
    <div id="ai-suggestion-area" class="hidden space-y-2">
      <div class="flex gap-2 items-start">
        <span class="text-lg">💡</span>
        <div id="ai-suggestion" class="ai-bubble rounded-xl px-4 py-3 text-sm text-gray-700 flex-1 whitespace-pre-wrap"></div>
      </div>
      <div class="flex justify-end">
        <button onclick="closeAI()" class="text-xs text-gray-400 hover:text-gray-600 px-3 py-1.5">閉じる</button>
      </div>
    </div>
  </div>

  <!-- タブ + 検索 -->
  <div class="space-y-3">
    <div class="flex gap-4 border-b border-gray-200 w-full pb-0">
      <button onclick="setTabFilter('all')"   id="tab-all"   class="tab-btn tab-active pb-2 text-sm">すべて</button>
      <button onclick="setTabFilter('memo')"  id="tab-memo"  class="tab-btn text-gray-500 pb-2 text-sm">memo</button>
      <button onclick="setTabFilter('error')" id="tab-error" class="tab-btn text-gray-500 pb-2 text-sm">error</button>
      <button onclick="setTabFilter('idea')"  id="tab-idea"  class="tab-btn text-gray-500 pb-2 text-sm">idea</button>
    </div>
    <div class="flex gap-2">
      <input id="search-q" type="text" placeholder="🔍 キーワード検索..."
        class="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-1.5"
        oninput="debounceLoad()"
      />
      <input id="search-project" type="text" placeholder="プロジェクト絞り込み"
        class="w-36 text-sm border border-gray-200 rounded-lg px-3 py-1.5"
        oninput="debounceLoad()"
      />
    </div>
  </div>

  <!-- ログ一覧 -->
  <div id="log-list" class="space-y-2"></div>
  <p id="empty-msg" class="hidden text-center text-gray-400 text-sm py-8">ログがありません</p>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-full opacity-0 pointer-events-none">
  保存しました
</div>

<script>
  // ---- State ----
  let currentTag = "memo";
  let currentTabFilter = "all";
  let debounceTimer = null;
  let allProjects = [];
  let lastSaved = null; // 直前に保存したログ
  // 類似ありと判定されたlog_id → 種類("duplicate"|"related") を保持
  const similarBadgeMap = new Map();

  // ---- Init ----
  loadLogs();
  fetchProjects();

  // ---- Tag ----
  function setTag(tag) {
    currentTag = tag;
    document.querySelectorAll(".tag-btn").forEach(b => b.classList.add("opacity-40"));
    document.getElementById(`btn-${tag}`).classList.remove("opacity-40");
  }

  // ---- Tab filter ----
  function setTabFilter(tab) {
    currentTabFilter = tab;
    document.querySelectorAll(".tab-btn").forEach(b => {
      b.classList.remove("tab-active");
      b.classList.add("text-gray-500");
    });
    const active = document.getElementById(`tab-${tab}`);
    active.classList.add("tab-active");
    active.classList.remove("text-gray-500");
    loadLogs();
  }

  // ---- Save & AI flow ----
  async function saveLog() {
    const content = document.getElementById("input-content").value.trim();
    const project = document.getElementById("input-project").value.trim();
    if (!content) return;

    // 保存
    const res = await fetch("/api/logs", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content, tag: currentTag, project })
    });

    const saved = await res.json();
    lastSaved = { id: saved.id, content, tag: currentTag, project };
    document.getElementById("input-content").value = "";
    showToast("残しました ✓");
    loadLogs();
    fetchProjects();

    // AI質問フローを開始
    startAIFlow(saved.id, content, currentTag);
  }

  // ---- AI Flow ----
  async function startAIFlow(logId, content, tag) {
    const aiArea = document.getElementById("ai-area");
    const aiQuestion = document.getElementById("ai-question");
    const aiLoading = document.getElementById("ai-loading");
    const aiAnswerArea = document.getElementById("ai-answer-area");
    const aiSuggestionArea = document.getElementById("ai-suggestion-area");

    // リセット＆表示
    aiQuestion.textContent = "";
    aiAnswerArea.classList.add("hidden");
    aiSuggestionArea.classList.add("hidden");
    aiArea.classList.remove("hidden");
    aiLoading.classList.remove("hidden");

    try {
      const res = await fetch("/api/ai/question", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ log_id: logId, content, tag })
      });
      const data = await res.json();
      aiLoading.classList.add("hidden");
      aiQuestion.textContent = data.question || "追加情報を教えてください。";
      lastSaved.ai_context_id = data.ai_context_id;
      aiAnswerArea.classList.remove("hidden");
      document.getElementById("ai-answer").focus();

      // バックグラウンドで類似ログ分析（awaitしない）
      analyzeSimilarInBackground(logId, content, tag);

    } catch (e) {
      aiLoading.classList.add("hidden");
      aiArea.classList.add("hidden");
    }
  }

  async function submitAnswer() {
    const answer = document.getElementById("ai-answer").value.trim();
    if (!answer || !lastSaved) return;

    const aiLoading = document.getElementById("ai-loading");
    const aiAnswerArea = document.getElementById("ai-answer-area");
    const aiSuggestionArea = document.getElementById("ai-suggestion-area");
    const aiSuggestion = document.getElementById("ai-suggestion");

    aiAnswerArea.classList.add("hidden");
    aiLoading.classList.remove("hidden");

    try {
      const res = await fetch("/api/ai/suggest", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          log_id: lastSaved.id,
          ai_context_id: lastSaved.ai_context_id,
          content: lastSaved.content,
          tag: lastSaved.tag,
          answer
        })
      });
      const data = await res.json();
      aiLoading.classList.add("hidden");
      aiSuggestion.textContent = data.suggestion || "";
      aiSuggestionArea.classList.remove("hidden");
      document.getElementById("ai-answer").value = "";
    } catch (e) {
      aiLoading.classList.add("hidden");
      aiSuggestionArea.classList.remove("hidden");
      document.getElementById("ai-suggestion").textContent = "提案の取得に失敗しました。";
    }
  }

  function skipAI() { closeAI(); }
  function closeAI() {
    document.getElementById("ai-area").classList.add("hidden");
    document.getElementById("ai-answer").value = "";
  }

  // ---- Load ----
  async function loadLogs() {
    const q       = document.getElementById("search-q").value.trim();
    const project = document.getElementById("search-project").value.trim();
    const tag     = currentTabFilter === "all" ? "" : currentTabFilter;

    const params = new URLSearchParams();
    if (tag)     params.set("tag", tag);
    if (project) params.set("project", project);
    if (q)       params.set("q", q);

    const res  = await fetch(`/api/logs?${params}`);
    const logs = await res.json();
    renderLogs(logs);
  }

  function renderLogs(logs) {
    const list = document.getElementById("log-list");
    const empty = document.getElementById("empty-msg");

    if (logs.length === 0) {
      list.innerHTML = "";
      empty.classList.remove("hidden");
      return;
    }
    empty.classList.add("hidden");

    list.innerHTML = logs.map(log => {
      const utc = new Date(log.created_at);
      const jst = new Date(utc.getTime() + 9 * 60 * 60 * 1000);
      const date = jst.toLocaleString("ja-JP", {
        month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit"
      });
      const projectBadge = log.project
        ? `<span class="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full">${esc(log.project)}</span>`
        : "";
      return `
        <div id="log-${log.id}" class="bg-white rounded-xl border border-gray-100 shadow-sm px-4 py-3 space-y-2">
          <!-- 表示モード -->
          <div id="view-${log.id}">
            <div class="flex items-start justify-between gap-2">
              <p class="text-sm text-gray-800 whitespace-pre-wrap flex-1">${esc(log.content)}</p>
              <div class="flex gap-1 flex-shrink-0">
                <button onclick="toggleAiHistory(${log.id})" class="text-gray-300 hover:text-purple-400 text-sm px-1" title="AI履歴">🤖</button>
                <button onclick="toggleRelations(${log.id})" class="text-gray-300 hover:text-indigo-400 text-sm px-1" title="関連ログ">🔗</button>
                <button onclick="startEdit(${log.id})" class="text-gray-300 hover:text-blue-400 text-sm px-1" title="編集">✎</button>
                <button onclick="deleteLog(${log.id})" class="text-gray-300 hover:text-red-400 text-lg leading-none" title="削除">×</button>
              </div>
            </div>
            <div class="flex items-center gap-2 flex-wrap mt-2">
              <span class="tag-${log.tag} text-xs px-2 py-0.5 rounded-full font-medium">${log.tag}</span>
              ${(log.tag === 'idea' || log.tag === 'memo') ? `<button onclick="cycleStatus(${log.id})" id="status-${log.id}"
                class="status-${log.status} text-xs px-2 py-0.5 rounded-full font-medium cursor-pointer hover:opacity-80 transition"
                title="クリックで次のステータスへ">${log.status}</button>` : ''}
              ${projectBadge}
              ${log.has_relations ? `<span class="text-xs bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-full cursor-pointer hover:bg-indigo-100"
                onclick="toggleRelations(${log.id})" title="関連ログあり">🔗 関連あり</span>` : ''}
              <span class="similar-badge text-xs px-2 py-0.5 rounded-full cursor-pointer"
                id="similar-badge-${log.id}" onclick="toggleRelations(${log.id})" title="AIが見つけた類似ログがあります"></span>
              <span class="text-xs text-gray-400 ml-auto">${date}</span>
            </div>
          </div>
          <!-- AI履歴エリア（初期非表示） -->
          <div id="ai-history-${log.id}" class="hidden mt-2 space-y-2 border-t border-gray-100 pt-2">
            <p class="text-xs text-gray-400">読み込み中...</p>
          </div>
          <!-- 関連ログエリア（初期非表示） -->
          <div id="relations-area-${log.id}" class="hidden mt-2 border-t border-gray-100 pt-3 space-y-2">
            <div class="flex items-center justify-between">
              <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide">🔗 関連ログ</span>
              <button onclick="showRelationForm(${log.id})"
                class="text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded hover:bg-indigo-100">＋ 関連ログを作成</button>
            </div>
            <div id="ai-suggested-${log.id}" class="space-y-1"></div>
            <div id="relations-list-${log.id}" class="space-y-1"></div>
            <!-- 関連ログ作成フォーム（初期非表示） -->
            <div id="relation-form-${log.id}" class="hidden mt-2 p-3 bg-gray-50 rounded-lg border border-gray-200 space-y-2">
              <!-- モード切替タブ -->
              <div class="flex gap-1 text-xs">
                <button id="rel-mode-new-${log.id}" onclick="setRelationMode(${log.id}, 'new')"
                  class="px-3 py-1 rounded font-medium bg-indigo-600 text-white">＋ 新規作成</button>
                <button id="rel-mode-search-${log.id}" onclick="setRelationMode(${log.id}, 'search')"
                  class="px-3 py-1 rounded font-medium bg-gray-200 text-gray-600 hover:bg-gray-300">🔍 既存から選ぶ</button>
              </div>
              <!-- 新規作成パネル -->
              <div id="rel-panel-new-${log.id}">
                <div class="flex gap-2 mb-2">
                  <select id="rel-tag-${log.id}" class="text-xs border border-gray-300 rounded px-2 py-1">
                    <option value="memo">📝 memo</option>
                    <option value="idea">💡 idea</option>
                    <option value="error">🐛 error</option>
                  </select>
                  <input id="rel-project-${log.id}" type="text" placeholder="プロジェクト（任意）"
                    class="text-xs border border-gray-300 rounded px-2 py-1 flex-1" value="${esc(log.project)}">
                </div>
                <textarea id="rel-content-${log.id}" rows="2" placeholder="関連ログの内容..."
                  class="w-full text-sm border border-gray-300 rounded px-3 py-2 resize-none focus:outline-none mb-2"></textarea>
                <input id="rel-note-${log.id}" type="text" placeholder="関連メモ（任意）例：原因ログ、参考アイデア..."
                  class="w-full text-xs border border-gray-300 rounded px-2 py-1 mb-2">
                <div class="flex gap-2 justify-end">
                  <button onclick="hideRelationForm(${log.id})" class="text-xs text-gray-400 hover:text-gray-600">キャンセル</button>
                  <button onclick="saveRelation(${log.id})"
                    class="text-xs bg-indigo-600 text-white px-3 py-1 rounded hover:bg-indigo-700">保存して紐付け</button>
                </div>
              </div>
              <!-- 既存検索パネル -->
              <div id="rel-panel-search-${log.id}" class="hidden">
                <input id="rel-search-${log.id}" type="text" placeholder="キーワードで検索..."
                  oninput="searchExistingLogs(${log.id})"
                  class="w-full text-sm border border-gray-300 rounded px-3 py-2 mb-2 focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <div id="rel-search-results-${log.id}" class="space-y-1 max-h-48 overflow-y-auto"></div>
                <div class="flex justify-end mt-2">
                  <button onclick="hideRelationForm(${log.id})" class="text-xs text-gray-400 hover:text-gray-600">キャンセル</button>
                </div>
              </div>
            </div>
          </div>
          <!-- 編集モード（初期非表示） -->
          <div id="edit-${log.id}" class="hidden space-y-2">
            <textarea id="edit-content-${log.id}" rows="3"
              class="w-full text-sm text-gray-800 border border-blue-200 rounded-lg px-3 py-2 resize-none"
            >${esc(log.content)}</textarea>
            <div class="flex gap-2 flex-wrap items-center">
              <div class="flex gap-1">
                ${['memo','error','idea'].map(t => `
                <button id="edit-btn-${t}-${log.id}" onclick="setEditTag(${log.id},'${t}')"
                  class="edit-tag-btn-${log.id} px-3 py-1 rounded-full text-xs font-medium border tag-${t} ${log.tag===t?'opacity-100':'opacity-40'}
                  ${t==='error'?'border-red-200':t==='idea'?'border-yellow-200':'border-blue-200'}">${t}</button>`).join('')}
              </div>
              <input id="edit-project-${log.id}" type="text" value="${esc(log.project)}"
                placeholder="プロジェクト（任意）"
                class="flex-1 min-w-[120px] text-xs border border-gray-200 rounded-lg px-3 py-1.5"
              />
              <div class="flex gap-1 ml-auto">
                <button onclick="cancelEdit(${log.id})" class="text-xs text-gray-400 hover:text-gray-600 px-3 py-1.5">キャンセル</button>
                <button onclick="saveEdit(${log.id})"
                  class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-4 py-1.5 rounded-lg transition">保存</button>
              </div>
            </div>
          </div>
        </div>`;
    }).join("");

    // 編集タグの初期状態を設定
    logs.forEach(log => { currentEditTag[log.id] = log.tag; });

    // 類似バッジを復元（再描画で消えないように）
    similarBadgeMap.forEach((type, id) => {
      applySimilarBadge(id, type);
    });
  }

  // ---- 類似バッジの見た目を適用（重複/関連で出し分け）----
  function applySimilarBadge(logId, type) {
    const badge = document.getElementById(`similar-badge-${logId}`);
    if (!badge) return;
    if (type === "duplicate") {
      badge.textContent = "🔁 重複";
      badge.className = "similar-badge visible text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full cursor-pointer hover:bg-orange-200";
      badge.title = "前にも同じ内容を残しています";
    } else {
      badge.textContent = "🔗 関連の気づき";
      badge.className = "similar-badge visible text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full cursor-pointer hover:bg-yellow-200";
      badge.title = "関連する過去メモがあります";
    }
  }

  // ---- Edit ----
  const currentEditTag = {};

  function setEditTag(id, tag) {
    currentEditTag[id] = tag;
    document.querySelectorAll(`.edit-tag-btn-${id}`).forEach(b => b.classList.add("opacity-40"));
    document.getElementById(`edit-btn-${tag}-${id}`).classList.remove("opacity-40");
  }

  // ---- AI履歴 ----
  async function toggleAiHistory(id) {
    const area = document.getElementById(`ai-history-${id}`);
    if (!area.classList.contains("hidden")) {
      area.classList.add("hidden");
      return;
    }
    area.classList.remove("hidden");
    area.innerHTML = '<p class="text-xs text-gray-400">読み込み中...</p>';

    const res = await fetch(`/api/logs/${id}/ai_contexts`);
    const contexts = await res.json();

    if (contexts.length === 0) {
      area.innerHTML = '<p class="text-xs text-gray-400">AI会話の記録はありません</p>';
      return;
    }

    area.innerHTML = contexts.map(ctx => `
      <div class="space-y-1 text-xs">
        ${ctx.question ? `<div class="flex gap-1"><span class="text-purple-400">🤖</span><span class="text-gray-600 whitespace-pre-wrap">${esc(ctx.question)}</span></div>` : ''}
        ${ctx.answer   ? `<div class="flex gap-1 pl-4"><span class="text-gray-400">💬</span><span class="text-gray-600 whitespace-pre-wrap">${esc(ctx.answer)}</span></div>` : ''}
        ${ctx.suggestion ? `<div class="flex gap-1"><span class="text-yellow-500">💡</span><span class="text-gray-600 whitespace-pre-wrap">${esc(ctx.suggestion)}</span></div>` : ''}
      </div>
    `).join('<hr class="border-gray-100 my-2">');
  }

  function startEdit(id) {
    document.getElementById(`view-${id}`).classList.add("hidden");
    document.getElementById(`edit-${id}`).classList.remove("hidden");
    document.getElementById(`edit-content-${id}`).focus();
  }

  function cancelEdit(id) {
    document.getElementById(`edit-${id}`).classList.add("hidden");
    document.getElementById(`view-${id}`).classList.remove("hidden");
  }

  async function saveEdit(id) {
    const content = document.getElementById(`edit-content-${id}`).value.trim();
    const project = document.getElementById(`edit-project-${id}`).value.trim();
    const tag     = currentEditTag[id] || "memo";
    if (!content) return;

    await fetch(`/api/logs/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content, tag, project })
    });

    showToast("更新しました ✓");
    loadLogs();
    fetchProjects();
  }

  // ---- Status cycle（ideaタグ用）----
  async function cycleStatus(id) {
    const res = await fetch(`/api/logs/${id}/status`, { method: "PATCH" });
    const log = await res.json();
    const btn = document.getElementById(`status-${id}`);
    if (btn) {
      btn.textContent = log.status;
      btn.className = `status-${log.status} text-xs px-2 py-0.5 rounded-full font-medium cursor-pointer hover:opacity-80 transition`;
    }
  }

  // ---- Delete ----
  async function deleteLog(id) {
    if (!confirm("削除しますか？")) return;
    await fetch(`/api/logs/${id}`, { method: "DELETE" });
    loadLogs();
  }

  // ---- Projects suggest ----
  async function fetchProjects() {
    const res = await fetch("/api/projects");
    allProjects = await res.json();
  }

  function showProjectSuggests(val) {
    const ul = document.getElementById("project-suggests");
    const filtered = val ? allProjects.filter(p => p.includes(val)) : allProjects;
    if (filtered.length === 0) { ul.classList.add("hidden"); return; }
    ul.innerHTML = filtered.map(p =>
      `<li class="px-3 py-1.5 hover:bg-gray-50 cursor-pointer" onmousedown="pickProject('${esc(p)}')">${esc(p)}</li>`
    ).join("");
    ul.classList.remove("hidden");
  }

  function pickProject(p) {
    document.getElementById("input-project").value = p;
    hideSuggests();
  }
  function hideSuggests() {
    document.getElementById("project-suggests").classList.add("hidden");
  }

  // ---- Debounce search ----
  function debounceLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadLogs, 300);
  }

  // ---- Toast ----
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.opacity = "1";
    setTimeout(() => t.style.opacity = "0", 2000);
  }

  // ---- Escape ----
  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ---- Enter shortcuts ----
  document.getElementById("input-content").addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) saveLog();
  });
  document.getElementById("ai-answer").addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) submitAnswer();
  });

  // ---- 関連ログ ----
  async function toggleRelations(logId) {
    const area = document.getElementById(`relations-area-${logId}`);
    if (!area.classList.contains("hidden")) {
      area.classList.add("hidden");
      return;
    }
    area.classList.remove("hidden");
    await loadAiSuggestedRelations(logId);  // AIの気づき（候補）
    await loadRelations(logId);             // 手動で紐付け済みの関連
  }

  // ---- AIが検知した類似候補（同じ関連エリアに表示）----
  async function loadAiSuggestedRelations(logId) {
    const box = document.getElementById(`ai-suggested-${logId}`);
    if (!box) return;
    box.innerHTML = '<p class="text-xs text-gray-400">AIの気づきを確認中...</p>';

    let data;
    try {
      const res = await fetch(`/api/logs/${logId}/similar`);
      data = await res.json();
    } catch (e) {
      box.innerHTML = "";
      return;
    }

    const items = (data.similar || []).filter(s => !s.already_linked);
    if (!items.length) {
      box.innerHTML = "";  // 候補なし or 全て紐付け済みなら何も出さない
      return;
    }

    const tagClass = { error:"tag-error", idea:"tag-idea", memo:"tag-memo" };
    const rows = items.map(s => {
      const isDup = s.relation_type === "duplicate";
      const label = isDup
        ? '<span class="text-xs bg-orange-100 text-orange-700 px-1.5 py-0.5 rounded-full shrink-0">🔁 重複</span>'
        : '<span class="text-xs bg-yellow-100 text-yellow-700 px-1.5 py-0.5 rounded-full shrink-0">🔗 関連</span>';
      return `
        <div class="flex items-start gap-2 p-2 bg-white rounded border border-amber-100">
          ${label}
          <span class="${tagClass[s.tag] || ''} text-xs px-1.5 py-0.5 rounded-full font-medium shrink-0">${s.tag}</span>
          <div class="flex-1 min-w-0">
            <p class="text-xs text-gray-700 whitespace-pre-wrap">${esc(s.content)}</p>
            ${s.reason ? `<p class="text-xs text-amber-500 mt-0.5">💭 ${esc(s.reason)}</p>` : ""}
          </div>
          <button onclick="adoptAiRelation(${logId}, ${s.id}, '${isDup ? '重複として記録' : 'AIが関連を検出'}')"
            class="text-xs bg-indigo-600 text-white px-2 py-0.5 rounded hover:bg-indigo-700 shrink-0">紐付ける</button>
        </div>`;
    }).join("");

    box.innerHTML = `
      <div class="space-y-1">
        <p class="text-xs font-semibold text-amber-600">💡 AIが見つけた候補（紐付けるか判断してください）</p>
        ${rows}
      </div>`;
  }

  // ---- AI候補を関連ログとして採用（手動紐付けと同じLogRelationに保存）----
  async function adoptAiRelation(logId, relatedLogId, note) {
    const res = await fetch(`/api/logs/${logId}/relations`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ related_log_id: relatedLogId, note }),
    });
    if (!res.ok) {
      const err = await res.json();
      alert("エラー: " + (err.error || "不明"));
      return;
    }
    showToast("関連ログを紐付けました ✓");
    // 候補リストと確定済みリストを再読込（採用済みは候補から消える）
    await loadAiSuggestedRelations(logId);
    await loadRelations(logId);
    // 🔗バッジを付与
    const card = document.getElementById(`log-${logId}`);
    if (card && !card.querySelector('.relation-badge')) {
      const badgeArea = card.querySelector('.flex.items-center.gap-2.flex-wrap');
      if (badgeArea) {
        const badge = document.createElement('span');
        badge.className = 'relation-badge text-xs bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-full cursor-pointer hover:bg-indigo-100';
        badge.setAttribute('onclick', `toggleRelations(${logId})`);
        badge.title = '関連ログあり';
        badge.textContent = '🔗 関連あり';
        badgeArea.append(badge);
      }
    }
  }

  async function loadRelations(logId) {
    const list = document.getElementById(`relations-list-${logId}`);
    list.innerHTML = '<p class="text-xs text-gray-400">読み込み中...</p>';

    const res  = await fetch(`/api/logs/${logId}/relations`);
    const data = await res.json();

    if (!data.length) {
      list.innerHTML = '<p class="text-xs text-gray-400">関連ログはまだありません</p>';
      return;
    }
    list.innerHTML = data.map(r => {
      const l   = r.related_log;
      const utc = new Date(l.created_at);
      const jst = new Date(utc.getTime() + 9 * 60 * 60 * 1000);
      const date = jst.toLocaleString("ja-JP", { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" });
      const tagClass = { error:"tag-error", idea:"tag-idea", memo:"tag-memo" }[l.tag] || "";
      return `
        <div class="flex items-start gap-2 p-2 bg-white rounded border border-gray-100 group">
          <span class="${tagClass} text-xs px-1.5 py-0.5 rounded-full font-medium shrink-0">${l.tag}</span>
          <div class="flex-1 min-w-0">
            <p class="text-xs text-gray-700 whitespace-pre-wrap">${esc(l.content)}</p>
            ${r.note ? `<p class="text-xs text-indigo-400 mt-0.5">📎 ${esc(r.note)}</p>` : ""}
            <p class="text-xs text-gray-400 mt-0.5">${date}</p>
          </div>
          <button onclick="deleteRelation(${logId}, ${r.relation_id})"
            class="text-gray-200 hover:text-red-400 text-xs opacity-0 group-hover:opacity-100 shrink-0 transition">✕</button>
        </div>`;
    }).join("");
  }

  function showRelationForm(logId) {
    document.getElementById(`relation-form-${logId}`).classList.remove("hidden");
    setRelationMode(logId, 'new');
    document.getElementById(`rel-content-${logId}`).focus();
  }

  function setRelationMode(logId, mode) {
    const isNew = mode === 'new';
    document.getElementById(`rel-panel-new-${logId}`).classList.toggle("hidden", !isNew);
    document.getElementById(`rel-panel-search-${logId}`).classList.toggle("hidden", isNew);
    document.getElementById(`rel-mode-new-${logId}`).className =
      `px-3 py-1 rounded font-medium text-xs ${isNew ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`;
    document.getElementById(`rel-mode-search-${logId}`).className =
      `px-3 py-1 rounded font-medium text-xs ${!isNew ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`;
    if (!isNew) {
      document.getElementById(`rel-search-${logId}`).focus();
      searchExistingLogs(logId); // 初期は全件表示
    }
  }

  async function searchExistingLogs(logId) {
    const q = document.getElementById(`rel-search-${logId}`).value.trim();
    const url = q ? `/api/logs?q=${encodeURIComponent(q)}` : `/api/logs`;
    const res  = await fetch(url);
    const logs = await res.json();
    const results = document.getElementById(`rel-search-results-${logId}`);

    // 自分自身と既に紐付き済みのものを除外
    const relRes = await fetch(`/api/logs/${logId}/relations`);
    const rels   = await relRes.json();
    const relatedIds = new Set(rels.map(r => r.related_log.id));
    relatedIds.add(logId);

    const filtered = logs.filter(l => !relatedIds.has(l.id));

    if (!filtered.length) {
      results.innerHTML = '<p class="text-xs text-gray-400 py-1">該当するログがありません</p>';
      return;
    }

    const tagClass = { error:"tag-error", idea:"tag-idea", memo:"tag-memo" };
    results.innerHTML = filtered.map(l => {
      const utc  = new Date(l.created_at);
      const jst  = new Date(utc.getTime() + 9 * 60 * 60 * 1000);
      const date = jst.toLocaleString("ja-JP", { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" });
      return `
        <div class="flex items-start gap-2 p-2 bg-white rounded border border-gray-100 hover:border-indigo-300 cursor-pointer transition"
          onclick="linkExistingLog(${logId}, ${l.id})">
          <span class="${tagClass[l.tag] || ''} text-xs px-1.5 py-0.5 rounded-full font-medium shrink-0">${l.tag}</span>
          <div class="flex-1 min-w-0">
            <p class="text-xs text-gray-700 truncate">${esc(l.content)}</p>
            <p class="text-xs text-gray-400">${date}</p>
          </div>
          <span class="text-xs text-indigo-500 shrink-0">紐付け</span>
        </div>`;
    }).join("");
  }

  async function linkExistingLog(logId, relatedLogId) {
    const res = await fetch(`/api/logs/${logId}/relations`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ related_log_id: relatedLogId }),
    });
    if (!res.ok) {
      const err = await res.json();
      alert("エラー: " + (err.error || "不明"));
      return;
    }
    hideRelationForm(logId);
    await loadRelations(logId);
    showToast("関連ログを紐付けました ✓");
    // 🔗バッジをその場で追加
    const card = document.getElementById(`log-${logId}`);
    if (card && !card.querySelector('.relation-badge')) {
      const badgeArea = card.querySelector('.flex.items-center.gap-2.flex-wrap');
      if (badgeArea) {
        const badge = document.createElement('span');
        badge.className = 'relation-badge text-xs bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-full cursor-pointer hover:bg-indigo-100';
        badge.setAttribute('onclick', `toggleRelations(${logId})`);
        badge.title = '関連ログあり';
        badge.textContent = '🔗 関連あり';
        badgeArea.append(badge);
      }
    }
  }

  function hideRelationForm(logId) {
    document.getElementById(`relation-form-${logId}`).classList.add("hidden");
    document.getElementById(`rel-content-${logId}`).value = "";
    document.getElementById(`rel-note-${logId}`).value = "";
    const searchEl = document.getElementById(`rel-search-${logId}`);
    if (searchEl) searchEl.value = "";
    const resultsEl = document.getElementById(`rel-search-results-${logId}`);
    if (resultsEl) resultsEl.innerHTML = "";
  }

  async function saveRelation(logId) {
    const content = document.getElementById(`rel-content-${logId}`).value.trim();
    const tag     = document.getElementById(`rel-tag-${logId}`).value;
    const project = document.getElementById(`rel-project-${logId}`).value.trim();
    const note    = document.getElementById(`rel-note-${logId}`).value.trim();

    if (!content) { alert("内容を入力してください"); return; }

    const res = await fetch(`/api/logs/${logId}/relations`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content, tag, project, note }),
    });

    if (!res.ok) {
      const err = await res.json();
      alert("エラー: " + (err.error || "不明"));
      return;
    }

    hideRelationForm(logId);
    await loadRelations(logId);
    showToast("関連ログを保存しました ✓");
    // 🔗バッジをその場で追加（loadLogsで再描画しないことでエリアが閉じるのを防ぐ）
    const card = document.getElementById(`log-${logId}`);
    if (card && !card.querySelector('.relation-badge')) {
      const badgeArea = card.querySelector('.flex.items-center.gap-2.flex-wrap');
      if (badgeArea) {
        const badge = document.createElement('span');
        badge.className = 'relation-badge text-xs bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-full cursor-pointer hover:bg-indigo-100';
        badge.setAttribute('onclick', `toggleRelations(${logId})`);
        badge.title = '関連ログあり';
        badge.textContent = '🔗 関連あり';
        badgeArea.append(badge);
      }
    }
  }

  async function deleteRelation(logId, relationId) {
    if (!confirm("この関連付けを削除しますか？（ログ自体は残ります）")) return;
    await fetch(`/api/logs/${logId}/relations/${relationId}`, { method: "DELETE" });
    await loadRelations(logId);
  }

  // ---- 類似ログ バックグラウンド分析 ----
  async function analyzeSimilarInBackground(logId, content, tag) {
    try {
      const res  = await fetch("/api/ai/similar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ log_id: logId, content, tag }),
      });
      const data = await res.json();
      if (data.similar && data.similar.length > 0) {
        // duplicateが1件でもあれば重複扱い、それ以外は関連
        const hasDup = data.similar.some(s => s.relation_type === "duplicate");
        const type = hasDup ? "duplicate" : "related";
        similarBadgeMap.set(logId, type);
        applySimilarBadge(logId, type);
      }
    } catch (e) {
      // バックグラウンドなのでエラーは無視
    }
  }
</script>
</body>
