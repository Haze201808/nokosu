<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nokosu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }
    .tag-error { background:#fee2e2; color:#dc2626; }
    .tag-idea  { background:#fef9c3; color:#ca8a04; }
    .tag-memo  { background:#dbeafe; color:#2563eb; }
    .tab-active { border-bottom: 2px solid #2563eb; color:#2563eb; font-weight:600; }
    textarea:focus, input:focus { outline: none; box-shadow: 0 0 0 2px #93c5fd; }
    #toast { transition: opacity 0.3s; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
  <span class="text-xl font-bold text-gray-800">残す</span>
  <span class="text-gray-300">|</span>
  <span class="text-sm text-gray-400 tracking-widest">nokosu</span>
</header>

<div class="max-w-2xl mx-auto px-4 py-6 space-y-6">

  <!-- 入力エリア -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 space-y-3">
    <textarea id="input-content" rows="3"
      placeholder="エラー、アイデア、メモ... なんでも残す"
      class="w-full text-sm text-gray-800 placeholder-gray-400 border border-gray-200 rounded-lg px-3 py-2 resize-none"
    ></textarea>

    <div class="flex gap-2 flex-wrap items-center">
      <!-- タグ選択 -->
      <div class="flex gap-1">
        <button onclick="setTag('memo')"  id="btn-memo"  class="tag-btn px-3 py-1 rounded-full text-xs font-medium border border-blue-200 tag-memo opacity-100">memo</button>
        <button onclick="setTag('error')" id="btn-error" class="tag-btn px-3 py-1 rounded-full text-xs font-medium border border-red-200 tag-error opacity-40">error</button>
        <button onclick="setTag('idea')"  id="btn-idea"  class="tag-btn px-3 py-1 rounded-full text-xs font-medium border border-yellow-200 tag-idea opacity-40">idea</button>
      </div>

      <!-- プロジェクト入力 -->
      <div class="relative flex-1 min-w-[140px]">
        <input id="input-project" type="text" placeholder="プロジェクト（任意）"
          class="w-full text-xs border border-gray-200 rounded-lg px-3 py-1.5"
          autocomplete="off"
          oninput="showProjectSuggests(this.value)"
          onblur="setTimeout(()=>hideSuggests(),150)"
        />
        <ul id="project-suggests"
          class="hidden absolute z-20 bg-white border border-gray-200 rounded-lg mt-1 w-full shadow text-xs">
        </ul>
      </div>

      <button onclick="saveLog()"
        class="ml-auto bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-1.5 rounded-lg transition">
        残す
      </button>
    </div>
  </div>

  <!-- タブ + 検索 -->
  <div class="space-y-3">
    <div class="flex items-center justify-between">
      <div class="flex gap-4 border-b border-gray-200 w-full pb-0">
        <button onclick="setTabFilter('all')"   id="tab-all"   class="tab-btn tab-active   pb-2 text-sm">すべて</button>
        <button onclick="setTabFilter('memo')"  id="tab-memo"  class="tab-btn text-gray-500 pb-2 text-sm">memo</button>
        <button onclick="setTabFilter('error')" id="tab-error" class="tab-btn text-gray-500 pb-2 text-sm">error</button>
        <button onclick="setTabFilter('idea')"  id="tab-idea"  class="tab-btn text-gray-500 pb-2 text-sm">idea</button>
      </div>
    </div>

    <div class="flex gap-2">
      <input id="search-q" type="text" placeholder="🔍 キーワード検索..."
        class="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-1.5"
        oninput="debounceLoad()"
      />
      <input id="search-project" type="text" placeholder="プロジェクト絞り込み"
        class="w-36 text-sm border border-gray-200 rounded-lg px-3 py-1.5"
        oninput="debounceLoad()"
      />
    </div>
  </div>

  <!-- ログ一覧 -->
  <div id="log-list" class="space-y-2"></div>
  <p id="empty-msg" class="hidden text-center text-gray-400 text-sm py-8">ログがありません</p>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-full opacity-0 pointer-events-none">
  保存しました
</div>

<script>
  // ---- State ----
  let currentTag = "memo";
  let currentTabFilter = "all";
  let debounceTimer = null;
  let allProjects = [];

  // ---- Init ----
  loadLogs();
  fetchProjects();

  // ---- Tag ----
  function setTag(tag) {
    currentTag = tag;
    document.querySelectorAll(".tag-btn").forEach(b => b.classList.add("opacity-40"));
    document.getElementById(`btn-${tag}`).classList.remove("opacity-40");
  }

  // ---- Tab filter ----
  function setTabFilter(tab) {
    currentTabFilter = tab;
    document.querySelectorAll(".tab-btn").forEach(b => {
      b.classList.remove("tab-active");
      b.classList.add("text-gray-500");
    });
    const active = document.getElementById(`tab-${tab}`);
    active.classList.add("tab-active");
    active.classList.remove("text-gray-500");
    loadLogs();
  }

  // ---- Save ----
  async function saveLog() {
    const content = document.getElementById("input-content").value.trim();
    const project = document.getElementById("input-project").value.trim();
    if (!content) return;

    await fetch("/api/logs", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content, tag: currentTag, project })
    });

    document.getElementById("input-content").value = "";
    showToast("残しました ✓");
    loadLogs();
    fetchProjects();
  }

  // ---- Load ----
  async function loadLogs() {
    const q       = document.getElementById("search-q").value.trim();
    const project = document.getElementById("search-project").value.trim();
    const tag     = currentTabFilter === "all" ? "" : currentTabFilter;

    const params = new URLSearchParams();
    if (tag)     params.set("tag", tag);
    if (project) params.set("project", project);
    if (q)       params.set("q", q);

    const res  = await fetch(`/api/logs?${params}`);
    const logs = await res.json();
    renderLogs(logs);
  }

  function renderLogs(logs) {
    const list = document.getElementById("log-list");
    const empty = document.getElementById("empty-msg");

    if (logs.length === 0) {
      list.innerHTML = "";
      empty.classList.remove("hidden");
      return;
    }
    empty.classList.add("hidden");

    list.innerHTML = logs.map(log => {
      const date = new Date(log.created_at).toLocaleString("ja-JP", {
        month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit"
      });
      const projectBadge = log.project
        ? `<span class="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full">${esc(log.project)}</span>`
        : "";
      return `
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm px-4 py-3 space-y-2">
          <div class="flex items-start justify-between gap-2">
            <p class="text-sm text-gray-800 whitespace-pre-wrap flex-1">${esc(log.content)}</p>
            <button onclick="deleteLog(${log.id})" class="text-gray-300 hover:text-red-400 text-lg leading-none flex-shrink-0" title="削除">×</button>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            <span class="tag-${log.tag} text-xs px-2 py-0.5 rounded-full font-medium">${log.tag}</span>
            ${projectBadge}
            <span class="text-xs text-gray-400 ml-auto">${date}</span>
          </div>
        </div>`;
    }).join("");
  }

  // ---- Delete ----
  async function deleteLog(id) {
    if (!confirm("削除しますか？")) return;
    await fetch(`/api/logs/${id}`, { method: "DELETE" });
    loadLogs();
  }

  // ---- Projects suggest ----
  async function fetchProjects() {
    const res = await fetch("/api/projects");
    allProjects = await res.json();
  }

  function showProjectSuggests(val) {
    const ul = document.getElementById("project-suggests");
    const filtered = val ? allProjects.filter(p => p.includes(val)) : allProjects;
    if (filtered.length === 0) { ul.classList.add("hidden"); return; }
    ul.innerHTML = filtered.map(p =>
      `<li class="px-3 py-1.5 hover:bg-gray-50 cursor-pointer" onmousedown="pickProject('${esc(p)}')">${esc(p)}</li>`
    ).join("");
    ul.classList.remove("hidden");
  }

  function pickProject(p) {
    document.getElementById("input-project").value = p;
    hideSuggests();
  }
  function hideSuggests() {
    document.getElementById("project-suggests").classList.add("hidden");
  }

  // ---- Debounce search ----
  function debounceLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadLogs, 300);
  }

  // ---- Toast ----
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.opacity = "1";
    setTimeout(() => t.style.opacity = "0", 2000);
  }

  // ---- Escape ----
  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ---- Enter to save ----
  document.getElementById("input-content").addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) saveLog();
  });
</script>
</body>
</html>
